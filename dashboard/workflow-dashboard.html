<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency Workflow Monitor</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; }
      .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }
      .card { background: #151515; border: 1px solid #333; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
      .meta { color: #bbb; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card"><h2>📊 Emergency Workflow Monitor</h2><div class="meta" id="meta"></div></div>
      <div id="timeline"></div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script>
      const firebaseConfig={apiKey:"AIzaSyCn5UICOAbmB8ldkWf1d34FOgQvXlyFP50",authDomain:"emergency-response-8701b.firebaseapp.com",projectId:"emergency-response-8701b",storageBucket:"emergency-response-8701b.firebasestorage.app",messagingSenderId:"558477100061",appId:"1:558477100061:web:074e110297b131b86172f4"};
      firebase.initializeApp(firebaseConfig); const db=firebase.firestore();
      const params=new URLSearchParams(window.location.search);
      const FILTER_EMERGENCY_ID=params.get("id");
      const timelineEl=document.getElementById("timeline"); let emergencies=[], requests=[], assignments=[], responses=[];
      console.log("[Workflow Dashboard] Filter emergency:", FILTER_EMERGENCY_ID||"latest");
      const fmt=(t)=>{ if(!t) return "—"; const d=t.toDate?t.toDate():new Date(t); return Number.isNaN(d.getTime())?"—":d.toLocaleString(); };
      function card(title, body){ return `<section class="card"><h3 style="margin:0 0 6px">${title}</h3><div>${body}</div></section>`; }
      function render(){
        if(!emergencies.length){timelineEl.innerHTML='<section class="card"><div class="meta">Waiting for emergency stream…</div></section>';return;}
        const e=FILTER_EMERGENCY_ID?emergencies.find(x=>x.id===FILTER_EMERGENCY_ID):emergencies[0];
        if(!e){timelineEl.innerHTML='<section class="card"><div class="meta">No workflow found for selected emergency.</div></section>';return;}
        const reqs=requests.filter(r=>r.emergencyId===e.id);
        const firstSpecialist=reqs.filter(r=>r.hasSpecialist&&r.status==="responded").sort((a,b)=>(a.respondedAt?.toMillis?.()||0)-(b.respondedAt?.toMillis?.()||0))[0];
        const a=assignments.find(x=>x.emergencyId===e.id)||{};
        const r=responses.find(x=>x.emergencyId===e.id)||{};
        const triggerTime=new Date(e.createdAt).getTime();
        const specialistSecs=firstSpecialist?.respondedAt?.toMillis?Math.max(0,Math.round((firstSpecialist.respondedAt.toMillis()-triggerTime)/1000)):null;
        document.getElementById("meta").textContent=`Emergency ${e.id} | ${e.patientName||"Unknown"} | ${e.emergencyType||"-"} | ${e.severity||"-"}`;
        timelineEl.innerHTML = [
          card("Step 1 - Emergency Triggered", `${fmt(e.createdAt)} | ${e.patientName || e.userId || "Unknown"} | Severity ${e.severity || "-"}`),
          card("Step 2 - Hospitals Notified", `${reqs.length} hospitals notified simultaneously.<br>${reqs.map((x)=>`${x.hospitalName} (${x.distanceKm ?? "-"} km)`).join("<br>") || "No hospital requests yet"}`),
          card("Step 3 - Specialist Found", firstSpecialist ? `${firstSpecialist.specialistName || "Specialist"} at ${firstSpecialist.hospitalName} responded in ${specialistSecs ?? "-"} seconds` : "Waiting for specialist response"),
          card("Step 4 - Hospital Auto Assigned", `${e.assignedHospital || "-"} | ${e.assignmentReason || "-"}`),
          card("Step 5 - Ambulance Dispatched", `${a.ambulanceId || e.assignedAmbulance || "-"} | ${a.ambulanceInfo?.type || "-"} | ${a.ambulanceInfo?.distance || "-"} | ETA ${a.ambulanceInfo?.estimatedArrival || "-"}`),
          card("Step 6 - Ambulance Accepted", a.status === "accepted" || a.status === "en_route_patient" || a.status === "picked_up" || a.status === "completed" ? `Accepted at ${fmt(a.updatedAt)}` : "Pending"),
          card("Step 7 - Patient Picked Up", a.status === "picked_up" || a.status === "arriving_hospital" || a.status === "completed" ? `Picked up at ${fmt(a.pickedUpAt || a.updatedAt)}` : "Pending"),
          card("Step 8 - Arrived at Hospital", a.status === "completed" ? `Completed at ${fmt(a.completedAt || a.updatedAt)}` : "Pending")
        ].join("");
      }
      if(FILTER_EMERGENCY_ID){
        db.collection("emergencies").doc(FILTER_EMERGENCY_ID).onSnapshot((doc)=>{
          emergencies=doc.exists?[{id:doc.id,...doc.data()}]:[];
          render();
        });
        db.collection("hospitalRequests").where("emergencyId","==",FILTER_EMERGENCY_ID).onSnapshot(s=>{requests=s.docs.map(d=>({id:d.id,...d.data()})); render();});
        db.collection("ambulanceAssignments").where("emergencyId","==",FILTER_EMERGENCY_ID).onSnapshot(s=>{assignments=s.docs.map(d=>({id:d.id,...d.data()})); render();});
        db.collection("hospitalResponses").where("emergencyId","==",FILTER_EMERGENCY_ID).onSnapshot(s=>{responses=s.docs.map(d=>({id:d.id,...d.data()})); render();});
      }else{
        db.collection("emergencies").orderBy("createdAt","desc").onSnapshot(s=>{emergencies=s.docs.map(d=>({id:d.id,...d.data()})); render();});
        db.collection("hospitalRequests").onSnapshot(s=>{requests=s.docs.map(d=>({id:d.id,...d.data()})); render();});
        db.collection("ambulanceAssignments").orderBy("assignedAt","desc").onSnapshot(s=>{assignments=s.docs.map(d=>({id:d.id,...d.data()})); render();});
        db.collection("hospitalResponses").orderBy("respondedAt","desc").onSnapshot(s=>{responses=s.docs.map(d=>({id:d.id,...d.data()})); render();});
      }
    </script>
  </body>
</html>
