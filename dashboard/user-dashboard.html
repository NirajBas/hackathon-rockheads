<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency Response — User Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --card: #111;
        --border: #222;
        --text: #e8e8e8;
        --muted: #888;
        --red: #ff3333;
        --green: #00ff88;
        --orange: #ff9900;
        --blue108: #0088ff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Inter", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.5;
      }
      /* --- Header --- */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        background: var(--card);
      }
      header h1 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 700;
      }
      .status-live {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.875rem;
        color: var(--muted);
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 12px var(--green);
        animation: pulse 2s ease infinite;
      }
      @keyframes pulse {
        50% {
          opacity: 0.6;
        }
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        animation: fadeIn 0.35s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      label {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 6px;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: #0d0d0d;
        color: var(--text);
        font-family: inherit;
        font-size: 1rem;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      .field {
        margin-bottom: 16px;
      }
      .btn-emergency {
        width: 100%;
        padding: 16px;
        font-size: 1.1rem;
        font-weight: 700;
        border: none;
        border-radius: 10px;
        background: linear-gradient(180deg, #ff4444, var(--red));
        color: #fff;
        cursor: pointer;
        box-shadow: 0 4px 24px rgba(255, 51, 51, 0.35);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .btn-emergency:hover:not(:disabled) {
        transform: scale(1.01);
        box-shadow: 0 6px 28px rgba(255, 51, 51, 0.45);
      }
      .btn-emergency:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .hidden {
        display: none !important;
      }
      .severity-high {
        color: var(--red);
        font-weight: 700;
      }
      .severity-medium {
        color: var(--orange);
        font-weight: 700;
      }
      .severity-low {
        color: var(--green);
        font-weight: 700;
      }
      .badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .badge-108 {
        background: rgba(0, 136, 255, 0.2);
        color: var(--blue108);
        border: 1px solid var(--blue108);
      }
      .badge-status {
        background: #1a1a1a;
        border: 1px solid var(--border);
      }
      .response-grid {
        display: grid;
        gap: 12px;
      }
      .response-grid strong {
        color: var(--muted);
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      /* --- Live hospital response panel --- */
      #hospitalResponsePanel {
        transition: box-shadow 0.3s ease, border-color 0.3s ease;
      }
      #hospitalResponsePanel.flash-accept {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.35);
        animation: flashBorder 1.2s ease 2;
      }
      @keyframes flashBorder {
        0%,
        100% {
          box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.35);
        }
        50% {
          box-shadow: 0 0 20px rgba(0, 255, 136, 0.55);
        }
      }
      .err {
        color: var(--red);
        font-size: 0.9rem;
        margin-top: 12px;
      }
      @media (max-width: 480px) {
        header h1 {
          font-size: 1rem;
        }
      }
      .family-nav {
        padding: 12px 24px;
        background: #0d0d0d;
        border-bottom: 1px solid var(--border);
      }
      .family-nav a {
        color: var(--green);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
      }
      .family-nav a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <nav class="family-nav" aria-label="Family dashboard">
      <a href="family-dashboard.html">← Back to Family Dashboard</a>
    </nav>
    <!-- Header: branding + live system indicator -->
    <header>
      <h1>🚨 Emergency Response System</h1>
      <div class="status-live">
        <span class="dot" aria-hidden="true"></span>
        <span>System online</span>
      </div>
    </header>

    <main class="wrap">
      <!-- Emergency trigger form -->
      <section class="card" aria-labelledby="form-title">
        <h2 id="form-title" style="margin-top: 0; font-size: 1rem">Simulate emergency</h2>
        <div class="field">
          <label for="userId">User ID</label>
          <input id="userId" type="text" value="user_001" autocomplete="off" />
        </div>
        <div class="field">
          <label for="bloodGroup">Blood group</label>
          <select id="bloodGroup">
            <option>A+</option>
            <option>A-</option>
            <option selected>B+</option>
            <option>B-</option>
            <option>O+</option>
            <option>O-</option>
            <option>AB+</option>
            <option>AB-</option>
          </select>
        </div>
        <div class="field">
          <label for="trigger">Describe the emergency</label>
          <textarea
            id="trigger"
            placeholder="e.g. car accident, person unconscious..."
          ></textarea>
        </div>
        <button type="button" class="btn-emergency" id="btnSimulate">
          🚨 SIMULATE EMERGENCY
        </button>
        <p id="formError" class="err hidden" role="alert"></p>
      </section>

      <!-- API response summary (after dispatch) -->
      <section id="responsePanel" class="card hidden" aria-live="polite">
        <h2 style="margin-top: 0; font-size: 1rem">Dispatch result</h2>
        <div id="responseBody" class="response-grid"></div>
      </section>

      <!-- Real-time hospital accept/reject from Firestore -->
      <section
        id="hospitalResponsePanel"
        class="card hidden"
        aria-live="polite"
      >
        <h2 style="margin-top: 0; font-size: 1rem">Live hospital response</h2>
        <div id="hospitalResponseBody">Waiting for hospital to respond…</div>
      </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script>
      /** Firebase Web SDK config — replace with your project values */
      const firebaseConfig = {
        apiKey: "AIzaSyCn5UICOAbmB8ldkWf1d34FOgQvXlyFP50",
        authDomain: "emergency-response-8701b.firebaseapp.com",
        projectId: "emergency-response-8701b",
        storageBucket: "emergency-response-8701b.firebasestorage.app",
        messagingSenderId: "558477100061",
        appId: "1:558477100061:web:074e110297b131b86172f4"
      };


      const API_BASE = "http://localhost:3000";

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      const btn = document.getElementById("btnSimulate");
      const formError = document.getElementById("formError");
      const responsePanel = document.getElementById("responsePanel");
      const responseBody = document.getElementById("responseBody");
      const hospitalPanel = document.getElementById("hospitalResponsePanel");
      const hospitalBody = document.getElementById("hospitalResponseBody");

      let unsubscribeResponses = null;
      let lastResponseKey = null;
      let audioCtx = null;

      /** Soft confirmation beep when hospital response updates */
      function playSoftBeep() {
        try {
          if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          }
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.type = "sine";
          o.frequency.value = 660;
          g.gain.value = 0.04;
          o.connect(g);
          g.connect(audioCtx.destination);
          o.start();
          o.stop(audioCtx.currentTime + 0.08);
        } catch (_) {
          /* ignore audio failures */
        }
      }

      function formatTime(ts) {
        if (!ts) return "—";
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return isNaN(d.getTime()) ? "—" : d.toLocaleString();
      }

      function severityClass(sev) {
        if (sev === "high") return "severity-high";
        if (sev === "medium") return "severity-medium";
        return "severity-low";
      }

      function renderDispatch(data) {
        const amb = data.ambulance || {};
        const hosp = data.hospital || {};
        const sev = data.severity || "medium";
        const amb108 =
          amb.type === "108"
            ? '<span class="badge badge-108">108 Government Service</span>'
            : "";

        responseBody.innerHTML = `
          <div><strong>Emergency ID</strong><br/>${data.emergencyId || "—"}</div>
          <div><strong>Severity</strong><br/><span class="${severityClass(sev)}">${sev}</span></div>
          <div><strong>Urgency score</strong><br/>${data.urgencyScore ?? "—"} / 10</div>
          <div><strong>Type / specialty</strong><br/>${data.type || "—"} · ${data.recommendedSpecialty || "—"}</div>
          <div><strong>Required beds</strong><br/>${data.requiredBeds || "—"}</div>
          <div><strong>Ambulance</strong><br/>
            ${amb.id || "—"} (${amb.type || "—"})<br/>
            <span class="badge badge-status">${amb.priority || ""}</span> ${amb108}
          </div>
          <div><strong>Hospital</strong><br/>
            ${hosp.name || "—"} · ETA ${hosp.eta || "—"}<br/>
            ICU beds: ${hosp.icuBeds ?? "—"} · Specialty: ${hosp.specialty || "—"}<br/>
            <em style="color:#888;font-size:0.9rem">${hosp.selectionReason || ""}</em><br/>
            Score: <strong>${hosp.score ?? "—"}</strong>
          </div>
          <div><strong>Status</strong><br/><span class="badge badge-status">${data.status || "—"}</span></div>
        `;
        responsePanel.classList.remove("hidden");
      }

      function listenHospitalResponses(emergencyId) {
        if (unsubscribeResponses) unsubscribeResponses();
        hospitalPanel.classList.remove("hidden");
        hospitalBody.textContent = "Waiting for hospital to respond…";
        hospitalPanel.classList.remove("flash-accept");

        unsubscribeResponses = db
          .collection("hospitalResponses")
          .where("emergencyId", "==", emergencyId)
          .onSnapshot(
            (snap) => {
              if (snap.empty) return;
              let latest = null;
              snap.forEach((doc) => {
                const row = { id: doc.id, ...doc.data() };
                const t = row.respondedAt;
                const timeMs = t && t.toMillis ? t.toMillis() : 0;
                if (!latest || timeMs > (latest._ms || 0)) {
                  latest = { ...row, _ms: timeMs };
                }
              });
              if (!latest) return;

              const key = `${latest.status}-${latest.specialistName}-${latest._ms}`;
              if (key !== lastResponseKey) {
                lastResponseKey = key;
                playSoftBeep();
              }

              const accepted = latest.status === "accepted";
              hospitalPanel.classList.toggle("flash-accept", accepted);

              hospitalBody.innerHTML = `
                <p style="font-size:1.1rem;font-weight:700;margin:0 0 12px">
                  ${accepted ? "✅ Hospital Accepted" : "❌ Hospital Rejected"}
                </p>
                <div class="response-grid">
                  <div><strong>Specialist</strong><br/>${latest.specialistName || "—"} (${latest.specialty || "—"})</div>
                  <div><strong>ICU beds (confirmed)</strong><br/>${latest.icuBeds ?? "—"}</div>
                  <div><strong>ER beds (confirmed)</strong><br/>${latest.erBeds ?? "—"}</div>
                  <div><strong>Responded at</strong><br/>${formatTime(latest.respondedAt)}</div>
                </div>
              `;
            },
            (err) => {
              hospitalBody.textContent =
                "Could not subscribe to hospital responses: " + err.message;
            }
          );
      }

      btn.addEventListener("click", async () => {
        formError.classList.add("hidden");
        const userId = document.getElementById("userId").value.trim();
        const trigger = document.getElementById("trigger").value.trim();
        const bloodGroup = document.getElementById("bloodGroup").value;

        if (!userId || !trigger) {
          formError.textContent = "Please enter a user ID and emergency description.";
          formError.classList.remove("hidden");
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Dispatching…';

        try {
          const res = await fetch(`${API_BASE}/emergency/create`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId, trigger, bloodGroup })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.error || `Request failed (${res.status})`);
          }

          renderDispatch(data);
          listenHospitalResponses(data.emergencyId);
        } catch (e) {
          formError.textContent =
            e.message || "Something went wrong. Is the API running on port 3000?";
          formError.classList.remove("hidden");
        } finally {
          btn.disabled = false;
          btn.textContent = "🚨 SIMULATE EMERGENCY";
        }
      });
    </script>
  </body>
</html>
