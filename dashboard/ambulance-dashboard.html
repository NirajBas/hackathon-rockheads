<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ambulance Driver Dashboard</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; }
      .workflow-sidebar { position: fixed; right: 0; top: 0; width: 300px; height: 100vh; background: #111; border-left: 1px solid #222; overflow-y: auto; padding: 20px; z-index: 100; }
      .main-content { margin-right: 300px; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .card { background: #151515; border: 1px solid #333; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
      .alert { border: 2px solid #ff9800; animation: flash 1s infinite; }
      @keyframes flash { 50% { border-color: #ff5722; } }
      .btn { padding: 10px 12px; border: 0; border-radius: 8px; font-weight: 700; cursor: pointer; margin-right: 8px; margin-top: 8px; }
      .ok { background: #00c853; color: #011; }
      .nav { background: #ff9800; color: #111; }
      .meta { color: #bbb; font-size: 13px; }
      .blood { color: #ff6b6b; font-size: 22px; font-weight: 700; }
      .wf-step { border: 1px solid #333; border-radius: 8px; padding: 8px; margin-bottom: 8px; background: #161616; }
      .wf-step.done { border-color: #1f8f4a; background: #0f2417; }
      .wf-step.active { border-color: #d1a700; animation: pulse 1.4s infinite; }
      @keyframes pulse { 50% { border-color: #f7d43a; } }
      @media (max-width: 900px) { .workflow-sidebar { width: 100%; height: 48px; overflow: hidden; bottom: 0; top: auto; } .main-content { margin-right: 0; margin-bottom: 48px; } .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="main-content wrap">
      <div class="card">
        <h2 id="title">🚑 Loading ambulance...</h2>
        <div id="ambMeta" class="meta"></div>
      </div>
      <div class="grid">
        <div>
          <div id="patientCard" class="card"><div class="meta">Waiting assignment...</div></div>
          <div id="patientLocCard" class="card"><div class="meta">Patient GPS pending...</div></div>
        </div>
        <div>
          <div id="hospitalCard" class="card"><div class="meta">Hospital details pending...</div></div>
          <div id="routeCard" class="card"><div class="meta">Route summary pending...</div></div>
          <div id="statusCard" class="card"><div class="meta">No active assignment...</div></div>
        </div>
      </div>
      <div id="assignmentPanel" class="card"><div class="meta">Listening for assignments...</div></div>
    </div>
    <aside class="workflow-sidebar">
      <h3>📊 Live Workflow</h3>
      <div class="meta" id="wfEmergencyId">No active emergency</div>
      <div class="meta" id="wfClock"></div>
      <div id="wfSteps"></div>
    </aside>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script>
      const firebaseConfig={apiKey:"AIzaSyCn5UICOAbmB8ldkWf1d34FOgQvXlyFP50",authDomain:"emergency-response-8701b.firebaseapp.com",projectId:"emergency-response-8701b",storageBucket:"emergency-response-8701b.firebasestorage.app",messagingSenderId:"558477100061",appId:"1:558477100061:web:074e110297b131b86172f4"};
      firebase.initializeApp(firebaseConfig); const db=firebase.firestore();
      const params = new URLSearchParams(window.location.search);
      const AMBULANCE_ID = params.get("id") || "amb_108_001";
      console.log("Ambulance ID:", AMBULANCE_ID);
      let currentAssignment = null;
      let currentEmergency = null;
      let watchId = null;
      let lastLocationShareAt = 0;
      let currentStatus = "assigned";
      let ambulanceOrigin = { lat: null, lng: null };
      let specialistUnsub = null;
      let emergencyLocUnsub = null;
      let notificationUnsub = null;
      const wfEmergencyIdEl = document.getElementById("wfEmergencyId");
      const wfClockEl = document.getElementById("wfClock");
      const wfStepsEl = document.getElementById("wfSteps");
      let wfNotification = null;
      setInterval(() => { wfClockEl.textContent = new Date().toLocaleTimeString(); }, 1000);
      db.collection("ambulances").doc(AMBULANCE_ID).get().then((doc) => {
        const data = doc.exists ? doc.data() : {};
        document.getElementById("title").textContent = `🚑 Ambulance ${AMBULANCE_ID} - ${data.type || "unknown"} Dashboard`;
        document.getElementById("ambMeta").textContent = `Priority: ${data.priority || "unknown"} | Status: ${data.status || "available"}`;
        ambulanceOrigin = {
          lat: Number(data.location?.lat) || null,
          lng: Number(data.location?.lng) || null
        };
      });

      function playAlert() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; gain.gain.value = 0.08;
        osc.start();
        setTimeout(() => { osc.stop(); ctx.close(); }, 900);
      }

      function navLink(lat, lng, dir) {
        if (!Number.isFinite(+lat) || !Number.isFinite(+lng)) return "#";
        return dir ? `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}` : `https://www.google.com/maps?q=${lat},${lng}`;
      }

      function renderWorkflow() {
        if (!currentAssignment) {
          wfEmergencyIdEl.textContent = "No active emergency";
          wfStepsEl.innerHTML = '<div class="meta">No active emergency</div>';
          return;
        }
        wfEmergencyIdEl.textContent = `Emergency: ${currentAssignment.emergencyId}`;
        const step5Done = !!wfNotification || !!currentAssignment.hospitalInfo?.id;
        const status = currentAssignment.status;
        const done6 = ["accepted", "en_route_patient", "picked_up", "en_route_hospital", "arrived_at_hospital", "completed"].includes(status);
        const done7 = ["picked_up", "en_route_hospital", "arrived_at_hospital", "completed"].includes(status);
        const done8 = ["arrived_at_hospital", "completed"].includes(status);
        const steps = [
          { done: step5Done, title: "🏥 Hospital Assigned", detail: currentAssignment.hospitalInfo?.name || "Pending..." },
          { done: !!currentAssignment.ambulanceInfo?.id, title: "🚑 Ambulance Dispatched", detail: `${currentAssignment.ambulanceInfo?.type || "-"} • ${currentAssignment.ambulanceInfo?.etaToPatient || "-"}` },
          { done: done6, title: "✅ Ambulance Accepted", detail: currentAssignment.acceptedAt || "Pending..." },
          { done: done7, title: "✅ Patient Picked Up", detail: currentAssignment.pickedUpAt || "Pending..." },
          { done: done8, title: "🏁 Arrived at Hospital", detail: currentAssignment.arrivedAt || "Pending..." }
        ];
        const active = steps.findIndex((s) => !s.done);
        wfStepsEl.innerHTML = steps.map((s, i) => `<div class="wf-step ${s.done ? "done" : i === active ? "active" : ""}"><div>${s.title}</div><div class="meta">${s.detail}</div></div>`).join("");
      }

      async function updateStatus(status, extra = {}) {
        if (!currentAssignment) return;
        currentStatus = status;
        const history = Array.isArray(currentAssignment.statusHistory) ? currentAssignment.statusHistory : [];
        const update = { status, updatedAt: new Date().toISOString(), ...extra, statusHistory: [...history, { status, at: new Date().toISOString() }] };
        console.log("[Firestore Write] ambulanceAssignments status update:", { assignmentId: currentAssignment.id, ...update });
        await db.collection("ambulanceAssignments").doc(currentAssignment.id).set(update, { merge: true });
      }

      function startLiveLocationSharing() {
        if (!navigator.geolocation) return;
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(async (pos) => {
          if (!currentAssignment) return;
          const now = Date.now();
          if (now - lastLocationShareAt < 10000) return;
          lastLocationShareAt = now;
          const payload = {
            ambulanceId: AMBULANCE_ID,
            emergencyId: currentAssignment.emergencyId,
            lat: Number(pos.coords.latitude),
            lng: Number(pos.coords.longitude),
            accuracy: Number(pos.coords.accuracy) || 0,
            speed: Number(pos.coords.speed) || 0,
            status: currentStatus,
            updatedAt: new Date().toISOString()
          };
          console.log("[Firestore Write] ambulanceLocations:", { ambulanceId: AMBULANCE_ID, ...payload });
          await db.collection("ambulanceLocations").doc(AMBULANCE_ID).set(payload, { merge: true });
          document.getElementById("ambMeta").textContent = `📡 Sharing live location with patient | Last shared: ${new Date().toLocaleTimeString()}`;
        }, () => {}, { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 });
      }

      function render(a, isNew) {
        const panel = document.getElementById("assignmentPanel");
        if (!a) { panel.innerHTML = '<div class="meta">No active assignment.</div>'; renderWorkflow(); return; }
        const p = a.patientInfo || {};
        const pLoc = a.patientLocation || {};
        const h = a.hospitalInfo || {};
        const amb = a.ambulanceInfo || {};
        const hLoc = h.location || {};
        console.log("Assignment found:", a);
        console.log("Patient:", p);
        console.log("Hospital:", h);
        panel.className = `card ${isNew ? "alert" : ""}`;
        panel.innerHTML = `
          <h3>🚨 NEW ASSIGNMENT!</h3>
          <div><strong>Emergency:</strong> ${a.emergencyId}</div>
          <div class="meta">Status: ${a.status || "assigned"}</div>
          <div>
            <button class="btn ok" id="acceptBtn">✅ Accept Assignment</button>
            <button class="btn ok" id="enRouteBtn">🚗 En Route to Patient</button>
            <button class="btn ok" id="pickedBtn">✅ Patient Picked Up</button>
            <button class="btn ok" id="hospitalBtn">🏥 En Route to Hospital</button>
            <button class="btn ok" id="arrivedBtn">🏁 Arrived at Hospital</button>
          </div>
        `;
        document.getElementById("patientCard").innerHTML = `
          <h3>👤 PATIENT INFORMATION</h3>
          <div>Name: ${p.name || "Pending..."}</div>
          <div>Age: ${p.age || "Pending..."} years</div>
          <div>Blood Group: <span class="blood">${p.bloodGroup || "Pending..."}</span></div>
          <div>Condition: ${p.condition || "Pending..."}</div>
          <div>Emergency Type: ${p.emergencyType || "Pending..."}</div>
          <div>Severity: <span style="color:${p.severity === "high" ? "#ff4d4f" : p.severity === "medium" ? "#ffb300" : "#66bb6a"}">${(p.severity || "Pending...").toUpperCase()}</span></div>
          <div>Urgency: ${p.urgencyScore ?? "Pending..."}/10</div>
          <div>Description: ${p.condition || "Pending..."}</div>
          <div>Medical History: ${p.medicalHistory || "None"}</div>
          <div>Family Contact: ${p.familyContact || "Pending..."}</div>
        `;
        document.getElementById("patientLocCard").innerHTML = `
          <h3>📍 PATIENT LOCATION (LIVE)</h3>
          <div>Lat: ${pLoc.lat ?? "Pending..."}</div>
          <div>Lng: ${pLoc.lng ?? "Pending..."}</div>
          <div>Last updated: ${pLoc.lastUpdated ? Math.max(0, Math.floor((Date.now()-new Date(pLoc.lastUpdated).getTime())/1000)) + "s ago" : "Pending..."}</div>
          <button class="btn nav" onclick="window.open('${navLink(pLoc.lat, pLoc.lng, true)}','_blank')">🗺️ NAVIGATE TO PATIENT</button>
        `;
        document.getElementById("hospitalCard").innerHTML = `
          <h3>🏥 DESTINATION HOSPITAL</h3>
          <div>Name: ${h.name || "Pending..."}</div>
          <div>Phone: ${h.phone || "Pending..."}</div>
          <div>Specialty: ${h.specialty || "Pending..."}</div>
          <div>ICU Beds: ${h.confirmedIcuBeds ?? h.icuBeds ?? "Pending..."}</div>
          <div>ER Beds: ${h.confirmedErBeds ?? h.erBeds ?? "Pending..."}</div>
          <div>Specialist: ${h.specialistName || "Pending..."}</div>
          <div>Distance: ${h.distance || "Pending..."}</div>
          <div>ETA: ${h.estimatedArrival || "Pending..."}</div>
          <button class="btn nav" onclick="window.open('${navLink(hLoc.lat, hLoc.lng, true)}','_blank')">🏥 NAVIGATE TO HOSPITAL</button>
        `;
        const routeLink = `https://www.google.com/maps/dir/?api=1&origin=${ambulanceOrigin.lat || 0},${ambulanceOrigin.lng || 0}&waypoints=${pLoc.lat || 0},${pLoc.lng || 0}&destination=${hLoc.lat || 0},${hLoc.lng || 0}`;
        document.getElementById("statusCard").innerHTML = `
          <h3>🚑 AMBULANCE INFO</h3>
          <div>Type: <span class="blood">${amb.type || "Pending..."}</span></div>
          <div>Priority: ${amb.priority || "Pending..."}</div>
          <div>Distance to patient: ${amb.distanceToPatient || "Pending..."}</div>
          <div>ETA to patient: ${amb.etaToPatient || "Pending..."}</div>
          <div class="meta">Current status: ${a.status || "assigned"}</div>
        `;
        document.getElementById("routeCard").innerHTML = `
          <h3>🗺️ YOUR ROUTE</h3>
          <div>1. Go to patient: ${amb.distanceToPatient || "Pending..."}</div>
          <div>ETA: ${amb.etaToPatient || "Pending..."}</div>
          <div>2. Go to hospital: ${h.distance || "Pending..."}</div>
          <div>ETA: ${h.estimatedArrival || "Pending..."}</div>
          <button class="btn nav" onclick="window.open('${routeLink}','_blank')">🗺️ FULL ROUTE MAP</button>
        `;
        document.getElementById("acceptBtn").onclick = async () => { await updateStatus("accepted", { acceptedAt: new Date().toISOString() }); startLiveLocationSharing(); };
        document.getElementById("enRouteBtn").onclick = () => updateStatus("en_route_patient");
        document.getElementById("pickedBtn").onclick = () => updateStatus("picked_up", { pickedUpAt: new Date().toISOString() });
        document.getElementById("hospitalBtn").onclick = () => updateStatus("en_route_hospital", { enRouteHospitalAt: new Date().toISOString() });
        document.getElementById("arrivedBtn").onclick = () => updateStatus("completed", { arrivedAt: new Date().toISOString() });
        renderWorkflow();
      }

      function attachEmergencyListeners(emergencyId) {
        if (!emergencyId) return;
        if (notificationUnsub) notificationUnsub();
        if (emergencyLocUnsub) emergencyLocUnsub();
        if (specialistUnsub) specialistUnsub();
        notificationUnsub = db.collection("notifications").where("emergencyId", "==", emergencyId).limit(1).onSnapshot((n) => {
          wfNotification = n.empty ? null : n.docs[0].data();
          renderWorkflow();
        });
        emergencyLocUnsub = db.collection("emergencies").doc(emergencyId).onSnapshot((doc) => {
          if (doc.exists && currentAssignment) {
            const em = doc.data() || {};
            currentAssignment.patientLocation = em.patientLocation || currentAssignment.patientLocation;
            render(currentAssignment, false);
          }
        });
        specialistUnsub = db.collection("hospitalResponses").where("emergencyId", "==", emergencyId).orderBy("respondedAt", "desc").limit(1).onSnapshot((resp) => {
          if (!resp.empty && currentAssignment) {
            const row = resp.docs[0].data() || {};
            currentAssignment.hospitalInfo = currentAssignment.hospitalInfo || {};
            currentAssignment.hospitalInfo.specialistName = row.specialistName || currentAssignment.hospitalInfo.specialistName;
            currentAssignment.hospitalInfo.confirmedIcuBeds = row.icuBeds ?? currentAssignment.hospitalInfo.confirmedIcuBeds;
            currentAssignment.hospitalInfo.confirmedErBeds = row.erBeds ?? currentAssignment.hospitalInfo.confirmedErBeds;
            render(currentAssignment, false);
          }
        });
      }

      db.collection("ambulanceAssignments")
        .where("ambulanceId", "==", AMBULANCE_ID)
        .where("status", "==", "assigned")
        .onSnapshot((snapshot) => {
          if (snapshot.empty) {
            console.log("No assignment found for", AMBULANCE_ID);
            return;
          }
          const doc = snapshot.docs[0];
          const next = { id: doc.id, ...doc.data() };
          const isNew = !currentAssignment || currentAssignment.id !== next.id;
          currentAssignment = next;
          currentEmergency = next.emergencyId;
          currentStatus = next.status || "assigned";
          attachEmergencyListeners(currentEmergency);
          if (isNew) playAlert();
          render(next, isNew);
        });

      db.collection("ambulanceAssignments")
        .where("ambulanceId", "==", AMBULANCE_ID)
        .onSnapshot((snapshot) => {
          if (snapshot.empty) {
            render(null, false);
            return;
          }
          const all = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
          const orderedStatus = ["assigned", "accepted", "en_route_patient", "picked_up", "en_route_hospital", "completed"];
          all.sort((a, b) => orderedStatus.indexOf(b.status || "assigned") - orderedStatus.indexOf(a.status || "assigned"));
          const next = all[0];
          if (!currentAssignment || currentAssignment.id !== next.id || currentAssignment.status !== next.status) {
            currentAssignment = next;
            currentEmergency = next.emergencyId;
            currentStatus = next.status || currentStatus;
            attachEmergencyListeners(currentEmergency);
            render(next, false);
          }
        });
    </script>
  </body>
</html>
