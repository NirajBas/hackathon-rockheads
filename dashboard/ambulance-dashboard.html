<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ambulance Driver Dashboard</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #0b0b0b; color: #fff; }
      .wrap { max-width: 1000px; margin: 0 auto; padding: 16px; }
      .card { background: #151515; border: 1px solid #333; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
      .alert { border: 2px solid #ff9800; animation: flash 1s infinite; }
      @keyframes flash { 50% { border-color: #ff5722; } }
      .btn { padding: 10px 12px; border: 0; border-radius: 8px; font-weight: 700; cursor: pointer; margin-right: 8px; margin-top: 8px; }
      .ok { background: #00c853; color: #011; }
      .nav { background: #ff9800; color: #111; }
      .meta { color: #bbb; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2 id="title">🚑 Loading ambulance...</h2>
        <div id="ambMeta" class="meta"></div>
      </div>
      <div id="assignmentPanel" class="card"><div class="meta">Listening for assignments...</div></div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script>
      const firebaseConfig={apiKey:"AIzaSyCn5UICOAbmB8ldkWf1d34FOgQvXlyFP50",authDomain:"emergency-response-8701b.firebaseapp.com",projectId:"emergency-response-8701b",storageBucket:"emergency-response-8701b.firebasestorage.app",messagingSenderId:"558477100061",appId:"1:558477100061:web:074e110297b131b86172f4"};
      firebase.initializeApp(firebaseConfig); const db=firebase.firestore();
      const AMBULANCE_ID=new URLSearchParams(location.search).get("id")||"amb_108_001";
      console.log("[Ambulance Dashboard] Loading ambulance:", AMBULANCE_ID);
      let currentAssignment = null;
      let watchId = null;
      db.collection("ambulances").doc(AMBULANCE_ID).get().then((doc) => {
        const data = doc.exists ? doc.data() : {};
        document.getElementById("title").textContent = `🚑 Ambulance ${AMBULANCE_ID} - ${data.type || "unknown"} Dashboard`;
        document.getElementById("ambMeta").textContent = `Priority: ${data.priority || "unknown"} | Status: ${data.status || "available"}`;
      });

      function playAlert() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; gain.gain.value = 0.08;
        osc.start();
        setTimeout(() => { osc.stop(); ctx.close(); }, 900);
      }

      function navLink(lat, lng, dir) {
        if (!Number.isFinite(+lat) || !Number.isFinite(+lng)) return "#";
        return dir ? `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}` : `https://www.google.com/maps?q=${lat},${lng}`;
      }

      async function updateStatus(status, extra = {}) {
        if (!currentAssignment) return;
        const history = Array.isArray(currentAssignment.statusHistory) ? currentAssignment.statusHistory : [];
        const update = { status, updatedAt: new Date().toISOString(), ...extra, statusHistory: [...history, { status, at: new Date().toISOString() }] };
        console.log("[Firestore Write] ambulanceAssignments status update:", { assignmentId: currentAssignment.id, ...update });
        await db.collection("ambulanceAssignments").doc(currentAssignment.id).set(update, { merge: true });
      }

      function startLiveLocationSharing() {
        if (!navigator.geolocation) return;
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(async (pos) => {
          if (!currentAssignment) return;
          const payload = { lat: Number(pos.coords.latitude), lng: Number(pos.coords.longitude), updatedAt: new Date().toISOString(), emergencyId: currentAssignment.emergencyId };
          console.log("[Firestore Write] ambulanceLocations:", { ambulanceId: AMBULANCE_ID, ...payload });
          await db.collection("ambulanceLocations").doc(AMBULANCE_ID).set(payload, { merge: true });
        }, () => {}, { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 });
      }

      function render(a, isNew) {
        const panel = document.getElementById("assignmentPanel");
        if (!a) { panel.innerHTML = '<div class="meta">No active assignment.</div>'; return; }
        const p = a.patientInfo || {};
        const h = a.hospitalInfo || {};
        const amb = a.ambulanceInfo || {};
        const loc = p.location || {};
        const hLoc = h.location || {};
        panel.className = `card ${isNew ? "alert" : ""}`;
        panel.innerHTML = `
          <h3>🚨 NEW ASSIGNMENT!</h3>
          <div><strong>PATIENT:</strong> ${p.name || "Unknown"} | ${p.age ?? "-"} | ${p.bloodGroup || "-"}</div>
          <div><strong>Condition:</strong> ${p.emergencyType || "-"} - ${(p.severity || "").toUpperCase()} | Urgency ${p.urgencyScore ?? "-"}/10</div>
          <div><strong>Patient Location:</strong> ${loc.lat ?? "-"}, ${loc.lng ?? "-"}</div>
          <button class="btn nav" onclick="window.open('${navLink(loc.lat, loc.lng, true)}','_blank')">🗺️ Navigate to Patient</button>
          <div style="margin-top:8px"><strong>Hospital:</strong> ${h.name || "Unknown"} | Specialist ${h.specialistName || "Pending"} | ICU ${h.confirmedIcuBeds ?? h.icuBeds ?? "-"}</div>
          <div><strong>Hospital Location:</strong> ${hLoc.lat ?? "-"}, ${hLoc.lng ?? "-"}</div>
          <button class="btn nav" onclick="window.open('${navLink(hLoc.lat, hLoc.lng, true)}','_blank')">🏥 Navigate to Hospital</button>
          <div class="meta">Distance to patient: ${amb.distance || "-"} | ETA: ${amb.estimatedArrival || "-"}</div>
          <div>
            <button class="btn ok" id="acceptBtn">✅ Accept Assignment</button>
            <button class="btn ok" id="enRouteBtn">🚗 En Route to Patient</button>
            <button class="btn ok" id="pickedBtn">✅ Patient Picked Up</button>
            <button class="btn ok" id="arriveBtn">🏥 Arriving at Hospital</button>
            <button class="btn ok" id="doneBtn">✅ Handover Complete</button>
          </div>
        `;
        document.getElementById("acceptBtn").onclick = async () => { await updateStatus("accepted"); startLiveLocationSharing(); };
        document.getElementById("enRouteBtn").onclick = () => updateStatus("en_route_patient");
        document.getElementById("pickedBtn").onclick = () => updateStatus("picked_up", { pickedUpAt: new Date().toISOString() });
        document.getElementById("arriveBtn").onclick = () => updateStatus("arriving_hospital");
        document.getElementById("doneBtn").onclick = () => updateStatus("completed", { completedAt: new Date().toISOString() });
      }

      db.collection("ambulanceAssignments").where("ambulanceId","==",AMBULANCE_ID).orderBy("assignedAt","desc").limit(1).onSnapshot((snap)=>{
        if (snap.empty) return render(null, false);
        const next = { id: snap.docs[0].id, ...snap.docs[0].data() };
        const isNew = !currentAssignment || currentAssignment.id !== next.id;
        currentAssignment = next;
        if (isNew) playAlert();
        render(currentAssignment, isNew);
      });
    </script>
  </body>
</html>
